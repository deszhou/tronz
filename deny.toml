
[graph]
targets = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]

[sources]
unknown-registry  = "deny"
unknown-git       = "deny"
allow-registry    = ["https://github.com/rust-lang/crates.io-index"]
allow-git         = []
