# cargo-deny configuration for tronz.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Evaluate the full feature set so deny sees every transitive dep.
all-features = true

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
# Warn on duplicate semver majors — common in the tonic/prost ecosystem.
multiple-versions = "warn"
# Wildcard version requirements (e.g. `dep = "*"`) are banned: they make
# builds non-reproducible.
wildcards = "deny"
highlight = "all"

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
